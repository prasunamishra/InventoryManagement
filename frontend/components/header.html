<!-- Profile edit popup -->
<div class="modal-overlay" id="profile-modal" style="display:none; z-index: 9999;">
  
  <div class="modal-box modal-box-sm">

    <!-- Popup header -->
    <div class="modal-header">
      <h3 class="modal-title">Edit Profile</h3>

      <!-- Close button -->
      <button class="modal-close" onclick="closeModal('profile-modal')">&#10005;</button>
    </div>

    <div class="modal-body">

      <!-- Profile form -->
      <form id="profile-form" novalidate>

        <!-- Full name input -->
        <div class="form-group">
          <label class="ap-label" for="profile-name">FULL NAME</label>
          <input class="ap-input" type="text" id="profile-name" required>
        </div>

        <!-- Username input -->
        <div class="form-group">
          <label class="ap-label" for="profile-username">USERNAME</label>
          <input class="ap-input" type="text" id="profile-username" required>
        </div>

        <!-- Email input -->
        <div class="form-group">
          <label class="ap-label" for="profile-email">EMAIL ADDRESS</label>
          <input class="ap-input" type="email" id="profile-email">
        </div>

        <!-- Show success or error message -->
        <p id="profile-msg" class="form-message" style="display:none;"></p>

        <!-- Buttons -->
        <div class="modal-footer">
          <button type="button" class="pag-btn" onclick="closeModal('profile-modal')">Cancel</button>
          <button type="submit" class="confirm-btn" id="profile-submit">Save Changes</button>
        </div>

      </form>

    </div>
  </div>
</div>
