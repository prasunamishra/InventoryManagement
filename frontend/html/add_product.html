<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8"> <!-- encoding -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- responsive -->
  <title>Add Product – GroceryFlow</title>
  <meta name="description" content="GroceryFlow – Add a new product to the master catalogue"> <!-- page desc -->
  <link rel="stylesheet" href="../css/style.css"> <!-- styles -->
</head>

<body class="inner-page">
  <div id="header-placeholder"></div> <!-- header -->

  <main class="inner-main">
    
    <!-- back button -->
    <button onclick="window.history.back()" class="confirm-btn back-btn">← Previous</button>

    <div class="form-card">
      <h1 class="page-title">Add New Product</h1>

      <!-- info text -->
      <p style="font-size: 18px;color:#6b7280;margin:-8px 0 20px;">
        Products are <strong>static catalogue entries</strong>. Stock levels are managed separately
        via Purchases (stock IN) and Orders (stock OUT).
      </p>

      <form id="add-product-form" novalidate>

        <!-- Supplier & reference -->
        <div class="ap-grid" style="margin-bottom: 24px;">
          
          <!-- supplier -->
          <div>
            <label class="ap-label" for="ap-supplier">SUPPLIER <span style="color:#ef4444">*</span></label>
            <select class="ap-input ap-select" id="ap-supplier" required>
              <option value="">Loading suppliers…</option>
            </select>
          </div>

          <!-- purchase date -->
          <div>
            <label class="ap-label" for="ap-pur-date">PURCHASE DATE <span style="color:#ef4444">*</span></label>
            <input class="ap-input" type="date" id="ap-pur-date" required>
          </div>

          <!-- invoice -->
          <div>
            <label class="ap-label" for="ap-invoice">INVOICE REFERENCE <span style="color:#ef4444">*</span></label>
            <div style="display: flex; gap: 8px;">
              <input class="ap-input" type="text" id="ap-invoice" placeholder="E.G. PUR-101"
                style="text-transform: uppercase;" required>
              <button type="button" id="ap-auto-invoice" class="pag-btn"
                style="white-space: nowrap; padding: 0 12px; height: 42px;">Auto</button> <!-- auto gen -->
            </div>
          </div>
        </div>

        <!-- product section -->
        <div style="margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;">
          <h3 style="font-size: 18px; font-weight: 700; color: #374151; text-transform: uppercase; letter-spacing: 0.05em;">
            📦 Products to Add / Purchase
          </h3>

          <!-- add row -->
          <button type="button" id="add-row-btn" class="pag-btn"
            style="background: #eff6ff; color: #2563eb; border-color: #bfdbfe;">
            + Add Another Product
          </button>
        </div>

        <!-- rows container -->
        <div id="product-rows-container" style="display: flex; flex-direction: column; gap: 16px;">
          
          <!-- row template -->
          <div class="product-row"
            style="background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px; position: relative;">
            
            <!-- remove row -->
            <button type="button" class="remove-row-btn"
              style="position: absolute; top: 12px; right: 12px; background: none; border: none; color: #ef4444; cursor: pointer; font-size: 18px; display: none;">&times;</button>

            <div class="ap-grid">
              
              <!-- name -->
              <div class="ap-grid-full">
                <label class="ap-label">PRODUCT NAME <span style="color:#ef4444">*</span></label>
                <input class="ap-input row-name" type="text" placeholder="e.g., Organic Milk" required>
              </div>

              <!-- category -->
              <div>
                <label class="ap-label">CATEGORY <span style="color:#ef4444">*</span></label>
                <select class="ap-input ap-select row-category" required>
                  <option value="Dairy">Dairy</option>
                  <option value="Bakery">Bakery</option>
                  <option value="Meat">Meat</option>
                  <option value="Frozen">Frozen</option>
                  <option value="Dry Goods">Dry Goods</option>
                  <option value="Beverages">Beverages</option>
                  <option value="Snacks">Snacks</option>
                  <option value="Household">Household</option>
                  <option value="Other">Other</option>
                </select>
              </div>

              <!-- cost -->
              <div>
                <label class="ap-label">COST PRICE (RS) <span style="color:#ef4444">*</span></label>
                <input class="ap-input row-cost" type="number" step="0.01" placeholder="0.00" min="0" required>
              </div>

              <!-- price -->
              <div>
                <label class="ap-label">SELLING PRICE (RS) <span style="color:#ef4444">*</span></label>
                <input class="ap-input row-price" type="number" step="0.01" placeholder="0.00" min="0" required>
              </div>

              <!-- qty -->
              <div>
                <label class="ap-label">QTY TO ADD <span style="color:#ef4444">*</span></label>
                <input class="ap-input row-qty" type="number" placeholder="1" min="1" value="1" required>
              </div>

            </div>
          </div>
        </div>

        <!-- submit -->
        <div class="form-actions" style="margin-top:30px; border-top: 1px solid #e5e7eb; padding-top: 20px;">
          <p id="ap-message" class="form-message" style="margin-bottom: 16px;" hidden></p> <!-- message -->
          <button type="submit" class="confirm-btn" id="ap-submit" style="width: 100%; height: 50px; font-size: 18px;">
            Save All Products & Update Stock
          </button>
        </div>
      </form>
    </div>
  </main>

  <div id="footer-placeholder"></div> <!-- footer -->

  <!-- scripts -->
  <script src="../js/env.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/add_product.js"></script>
</body>

</html>
