<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logistics – GroceryFlow</title>
  <meta name="description" content="GroceryFlow – Manage logistics and delivery orders">
  <link rel="stylesheet" href="../css/style.css">
</head>

<body class="inner-page">

  <div id="header-placeholder"></div>

  <main class="inner-main">

    <!-- Previous Button -->
    <button onclick="window.history.back()" class="confirm-btn back-btn">
      ← Previous
    </button>

    <div class="page-header-row logistics-header-row">
      <h1 class="page-title logistics-page-title">Logistics Command</h1>
      <a href="create_order.html" class="confirm-btn">+ CREATE ORDER</a>
    </div>

    <!-- Active Deliveries Box -->
    <div class="active-deliv-card active-deliv-card-spaced">
      <div class="active-deliv-label">ACTIVE DELIVERIES</div>
      <div class="active-deliv-value" id="active-deliv-count">0</div>
    </div>

    <!-- Search & Filter Bar -->
    <div class="filter-bar" id="logi-filter-bar">
      <div class="filter-search-wrap">
        <svg class="filter-search-icon" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="logi-search" class="filter-search-input" placeholder="Search by customer, product, invoice…">
      </div>
      <select id="logi-filter-status" class="filter-select">
        <option value="">All Statuses</option>
        <option>Pending</option>
        <option>In Transit</option>
        <option>Shipped</option>
        <option>Delivered</option>
        <option>Delayed</option>
      </select>
      <button type="button" id="logi-filter-reset" class="filter-reset-btn">&#8635; Reset</button>
    </div>

    <!-- Table Section -->
    <div class="prod-table-wrap">
      <table class="prod-table" id="logistics-table">
        <thead>
          <tr>
            <th>Invoice #</th>
            <th>Customer Name</th>
            <th>Address</th>
            <th>Products (Items)</th>
            <th>Delivery Status</th>
          </tr>
        </thead>
        <tbody id="logistics-tbody">
          <tr><td colspan="4" class="no-data">Loading…</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Row template -->
    <template id="logistics-row-tpl">
      <tr>
        <td data-logi-invoice style="font-size: 18px;color:#6b7280;font-family:monospace;"></td>
        <td data-logi-customer></td>
        <td data-logi-address></td>
        <td>
          <span class="product-grey-pill" data-logi-product></span>
        </td>
        <td>
          <div class="status-pill-wrap" data-logi-status-wrap>
            <span class="status-dot"></span>
            <select data-logi-status-select style="background: transparent; border: none; font-weight: 700; font-size: 18px; outline: none; color: inherit; cursor: pointer; box-shadow: none;">
              <option value="Pending">Pending</option>
              <option value="In Transit">In Transit</option>
              <option value="Shipped">Shipped</option>
              <option value="Delivered">Delivered</option>
              <option value="Delayed">Delayed</option>
            </select>
          </div>
        </td>
      </tr>
    </template>

    <!-- Orders are created via create_order.html (multi-product) -->

  </main>

  <div id="footer-placeholder"></div>

  <script src="../js/env.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/logistics.js"></script>

</body>
</html>
