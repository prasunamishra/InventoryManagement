<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suppliers – GroceryFlow</title>
  <meta name="description" content="GroceryFlow – View and manage product suppliers">
  <link rel="stylesheet" href="../css/style.css">
</head>

<body class="inner-page">
  <div id="header-placeholder"></div>

  <main class="inner-main">

    <button onclick="window.history.back()" class="confirm-btn back-btn">
      ← Previous
    </button>

    <div class="page-header-row">
      <h1 class="page-title">Suppliers</h1>
      <a href="add_supplier.html" class="confirm-btn">+ ADD SUPPLIER</a>
    </div>

    <!-- Search -->
    <div class="prod-search-wrap">
      <span class="prod-search-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </span>
      <input type="text" id="sup-search" class="prod-search-input" placeholder="Search suppliers…">
    </div>

    <div class="prod-table-wrap">
      <table class="prod-table">
        <thead>
          <tr>
            <th>Supplier Name</th>
            <th>Phone</th>
            <th>Email</th>
            <th>Added On</th>
            <th class="text-center">Actions</th>
          </tr>
        </thead>
        <tbody id="supplier-tbody">
          <tr>
            <td colspan="5" class="no-data">Loading…</td>
          </tr>
        </tbody>
      </table>
    </div>

    <template id="supplier-row-tpl">
    <tr>
      <td data-sup-name class="prod-name-cell"></td>
      <td data-sup-phone></td>
      <td data-sup-email></td>
      <td data-sup-date></td>
      <td class="text-center">
        <div class="tbl-actions">
          <button class="pag-btn btn-edit" data-edit-btn>Edit</button>
          <button class="delete-btn btn-sm" data-del-btn>Delete</button>
        </div>
      </td>
    </tr>
  </template>

  </main>

  <!-- EDIT Modal -->
  <div class="modal-overlay" id="edit-modal" style="display:none;">
    <div class="modal-box">
      <div class="modal-header">
        <h3 class="modal-title">Edit Supplier</h3>
        <button class="modal-close" onclick="closeModal('edit-modal')">&#10005;</button>
      </div>
      <div class="modal-body">
        <form id="edit-supplier-form" novalidate>
          <input type="hidden" id="edit-sup-id">
          
          <div class="edit-row">
            <div class="edit-col edit-col-full">
              <label class="ap-label" for="edit-sup-name">SUPPLIER NAME</label>
              <input class="ap-input" type="text" id="edit-sup-name" required>
            </div>
          </div>
          
          <div class="edit-row">
            <div class="edit-col">
              <label class="ap-label" for="edit-sup-phone">PHONE</label>
              <input class="ap-input" type="tel" id="edit-sup-phone" required pattern="[0-9]{10}" maxlength="10">
            </div>
            <div class="edit-col">
              <label class="ap-label" for="edit-sup-email">EMAIL</label>
              <input class="ap-input" type="email" id="edit-sup-email" required>
            </div>
          </div>
          
          <p id="edit-sup-msg" class="form-message" style="display:none;"></p>
          
          <div class="modal-footer">
            <button type="button" class="pag-btn" onclick="closeModal('edit-modal')">Cancel</button>
            <button type="submit" class="confirm-btn" id="edit-sup-submit">Save Changes</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- DELETE CONFIRMATION Modal -->
  <div class="modal-overlay" id="sup-delete-modal" style="display:none;">
    <div class="modal-box modal-box-delete">
      <div class="delete-icon-wrapper">
        <svg viewBox="0 0 24 24" class="delete-alert-icon">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
          <line x1="12" y1="9" x2="12" y2="13"></line>
          <line x1="12" y1="17" x2="12.01" y2="17"></line>
        </svg>
      </div>
      <h3 class="delete-modal-title">Delete Confirmation</h3>
      <p class="delete-modal-subtitle">Are you sure you want to delete this supplier?</p>
      <div class="delete-modal-actions">
        <button class="delete-confirm-btn" id="sup-confirm-delete-btn">DELETE</button>
        <button class="delete-cancel-btn" onclick="closeModal('sup-delete-modal')">CANCEL</button>
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="../js/env.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/suppliers.js"></script>
</body>

</html>
