<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suppliers – GroceryFlow</title>
  <meta name="description" content="GroceryFlow – View and manage product suppliers">
  <link rel="stylesheet" href="../css/style.css">
</head>

<body class="inner-page">
  <div id="header-placeholder"></div>

  <main class="inner-main">

    <button onclick="window.history.back()" class="confirm-btn back-btn">
      ← Previous
    </button>

    <div class="page-header-row">
      <h1 class="page-title">Suppliers</h1>
      <a href="add_supplier.html" id="add-sup-btn" class="confirm-btn">+ ADD SUPPLIER</a>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar" id="sup-filter-bar">
      <div class="filter-search-wrap" style="flex:2;">
        <svg class="filter-search-icon" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2.5">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        <input type="text" id="sup-search" class="filter-search-input" placeholder="Search suppliers…">
      </div>
    </div>
    
    <!-- Active/Inactive Toggle -->
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:14px;margin-top:14px;">
      <label style="font-size: 18px;color:#4b5563;display:flex;align-items:center;gap:8px;cursor:pointer;">
        <input type="checkbox" id="show-inactive-toggle" checked>
        Show Inactive Suppliers
      </label>
    </div>

    <div class="prod-table-wrap">
      <table class="prod-table">
        <thead>
          <tr>
            <th>Supplier Name</th>
            <th>Phone</th>
            <th>Email</th>
            <th>Added On</th>
            <th class="text-center">Actions</th>
          </tr>
        </thead>
        <tbody id="supplier-tbody">
          <tr>
            <td colspan="5" class="no-data">Loading…</td>
          </tr>
        </tbody>
      </table>
    </div>

    <template id="supplier-row-tpl">
    <tr>
      <td data-sup-name class="prod-name-cell"></td>
      <td data-sup-phone></td>
      <td data-sup-email></td>
      <td data-sup-date></td>
      <td class="text-center">
        <div class="tbl-actions">
          <button class="pag-btn btn-edit" data-edit-btn>Edit</button>
          <button class="delete-btn btn-sm status-toggle-btn" data-status-btn></button>
        </div>
      </td>
    </tr>
  </template>

  </main>

  <!-- EDIT Modal -->
  <div class="modal-overlay" id="edit-modal" style="display:none;">
    <div class="modal-box">
      <div class="modal-header">
        <h3 class="modal-title">Edit Supplier</h3>
        <button class="modal-close" onclick="closeModal('edit-modal')">&#10005;</button>
      </div>
      <div class="modal-body">
        <form id="edit-supplier-form" novalidate>
          <input type="hidden" id="edit-sup-id">
          
          <div class="edit-row">
            <div class="edit-col edit-col-full">
              <label class="ap-label" for="edit-sup-name">SUPPLIER NAME</label>
              <input class="ap-input" type="text" id="edit-sup-name" required>
            </div>
          </div>
          
          <div class="edit-row">
            <div class="edit-col">
              <label class="ap-label" for="edit-sup-phone">PHONE</label>
              <input class="ap-input" type="tel" id="edit-sup-phone" required pattern="[0-9]{10}" maxlength="10">
            </div>
            <div class="edit-col">
              <label class="ap-label" for="edit-sup-email">EMAIL</label>
              <input class="ap-input" type="email" id="edit-sup-email" required>
            </div>
          </div>
          
          <p id="edit-sup-msg" class="form-message" style="display:none;"></p>
          
          <div class="modal-footer">
            <button type="button" class="pag-btn" onclick="closeModal('edit-modal')">Cancel</button>
            <button type="submit" class="confirm-btn" id="edit-sup-submit">Save Changes</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- STATUS CONFIRMATION Modal -->
  <div class="modal-overlay" id="status-modal" style="display:none; z-index: 9999;">
    <div class="modal-box modal-box-sm">
      <div class="modal-header">
        <h3 class="modal-title">Confirm Status Change</h3>
        <button class="modal-close" onclick="closeModal('status-modal')">&#10005;</button>
      </div>
      <div class="modal-body">
        <p id="status-confirm-msg" style="font-size: 18px; margin-bottom: 20px;">Are you sure you want to change the status?</p>
        <div class="modal-footer">
          <button type="button" class="pag-btn" onclick="closeModal('status-modal')">Cancel</button>
          <button type="button" class="confirm-btn" id="confirm-status-btn">Yes, Proceed</button>
        </div>
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="../js/env.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/suppliers.js"></script>
</body>

</html>
