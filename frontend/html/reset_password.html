<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password – GroceryFlow</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body class="login-page">

  <div class="login-wrapper">
    <div class="login-card">

      <div class="login-logo">
        <span class="login-logo-icon">🛒</span>
        GroceryFlow
      </div>
      <p class="login-subtitle" id="page-subtitle">Set New Password</p>

      <div id="loading-state" style="text-align: center; padding: 20px; color: #4b5563;">
        Verifying secure link...
      </div>

      <div id="invalid-state" style="display: none; text-align: center; padding: 20px;">
        <p style="color: #b91c1c; font-weight: 500; margin-bottom: 15px;">Invalid or Expired Link</p>
        <p style="font-size: 14px; color: #4b5563; margin-bottom: 20px;">This password reset link is invalid or has already expired.</p>
        <a href="forgot_password.html" class="login-btn" style="display: inline-block; width: 100%; box-sizing: border-box; text-decoration: none; text-align: center;">Request New Link</a>
      </div>

      <form id="resetForm" novalidate style="display: none;">
        <p style="font-size: 14px; color: #4b5563; margin-bottom: 20px; line-height: 1.5;">
          Please enter your new password below. It will take effect immediately.
        </p>

        <input type="hidden" id="reset-token">

        <div class="form-group">
          <label class="form-label" for="new_password">NEW PASSWORD</label>
          <input type="password" id="new_password" class="form-input" placeholder="Enter new password" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm_password">CONFIRM PASSWORD</label>
          <input type="password" id="confirm_password" class="form-input" placeholder="Confirm new password" required>
        </div>

        <p id="reset-msg" class="login-error" style="display:none;"></p>

        <button type="submit" id="reset-submit" class="login-btn">UPDATE PASSWORD</button>
      </form>
    </div>

    <p class="login-footer-text">© 2026 GroceryFlow – Inventory & Logistics</p>
  </div>

  <script src="../js/env.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/reset_password.js"></script>
</body>

</html>
