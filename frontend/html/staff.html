<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Directory – GroceryFlow</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="inner-page">
  <div id="header-placeholder"></div>

  <main class="inner-main">
    <button onclick="window.history.back()" class="confirm-btn back-btn">
      ← Previous
    </button>

    <div class="page-header-row">
      <h1 class="page-title">Staff Directory</h1>
      <a href="add_staff.html" class="confirm-btn" id="add-staff-btn">+ ADD STAFF</a>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar" id="staff-filter-bar">
      <div class="filter-search-wrap" style="flex:2;">
        <svg class="filter-search-icon" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2.5">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        <input type="text" id="staff-search" class="filter-search-input" placeholder="Search by name, username, or role...">
      </div>
    </div>
    
    <!-- Active/Inactive Toggle -->
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:14px;margin-top:14px;">
      <label style="font-size: 18px;color:#4b5563;display:flex;align-items:center;gap:8px;cursor:pointer;">
        <input type="checkbox" id="show-inactive-toggle" checked>
        Show Inactive Staff
      </label>
    </div>

    <!-- Table -->
    <div class="prod-table-wrap">
      <table class="prod-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Username</th>
            <th>Phone</th>
            <th>Role</th>
            <th class="text-center">Actions</th>
          </tr>
        </thead>
        <tbody id="staff-tbody">
          <tr>
            <td colspan="5" class="no-data">Loading…</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <!-- Row Template -->
  <template id="staff-row-tpl">
    <tr>
      <td data-name style="max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"></td>
      <td data-username style="font-size: 18px;color:#6b7280;font-family:monospace; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"></td>
      <td data-phone></td>
      <td><span class="cat-badge" data-role></span></td>
      <td class="text-center">
        <div class="tbl-actions">
          <button class="pag-btn btn-edit" data-edit title="Edit Staff">Edit</button>
          <button class="delete-btn btn-sm status-toggle-btn" data-status-btn></button>
        </div>
      </td>
    </tr>
  </template>

  <!-- STATUS CONFIRMATION Modal -->
  <div class="modal-overlay" id="status-modal" style="display:none; z-index: 9999;">
    <div class="modal-box modal-box-sm">
      <div class="modal-header">
        <h3 class="modal-title">Confirm Status Change</h3>
        <button class="modal-close" onclick="closeModal('status-modal')">&#10005;</button>
      </div>
      <div class="modal-body">
        <p id="status-confirm-msg" style="font-size: 18px; margin-bottom: 20px;">Are you sure you want to change the status?</p>
        <div class="modal-footer">
          <button type="button" class="pag-btn" onclick="closeModal('status-modal')">Cancel</button>
          <button type="button" class="confirm-btn" id="confirm-status-btn">Yes, Proceed</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/env.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/staff.js"></script>
</body>
</html>
