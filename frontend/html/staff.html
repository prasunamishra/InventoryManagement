<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"> <!-- encoding -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- responsive -->
  <title>Staff Directory – GroceryFlow</title>
  <link rel="stylesheet" href="../css/style.css"> <!-- styles -->
</head>
<body class="inner-page">
  
  <div id="header-placeholder"></div> <!-- header load -->

  <main class="inner-main">

    <button onclick="window.history.back()" class="confirm-btn back-btn">
      ← Previous <!-- go back -->
    </button>

    <div class="page-header-row">
      <h1 class="page-title">Staff Directory</h1>
      <a href="add_staff.html" class="confirm-btn" id="add-staff-btn">+ ADD STAFF</a> <!-- add staff -->
    </div>

    <!-- Filter -->
    <div class="filter-bar" id="staff-filter-bar">
      <div class="filter-search-wrap" style="flex:2;">
        
        <!-- icon -->
        <svg class="filter-search-icon" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2.5">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>

        <!-- search input -->
        <input type="text" id="staff-search" class="filter-search-input" placeholder="Search by name, username, or role...">
      </div>
    </div>

    <!-- Table -->
    <div class="prod-table-wrap">
      <table class="prod-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Username</th>
            <th>Role</th>
            <th class="text-center">Actions</th>
          </tr>
        </thead>

        <tbody id="staff-tbody"> <!-- dynamic data -->
          <tr>
            <td colspan="4" class="no-data">Loading…</td> <!-- loading -->
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <div id="footer-placeholder"></div> <!-- footer load -->

  <!-- Row template -->
  <template id="staff-row-tpl">
    <tr>
      <td data-name></td> <!-- name -->
      <td data-username style="font-size: 18px;color:#6b7280;font-family:monospace;"></td> <!-- username -->
      <td><span class="cat-badge" data-role></span></td> <!-- role -->
      <td class="text-center">
        <div class="tbl-actions">
          <button class="pag-btn btn-edit" data-edit title="Edit Staff">Edit</button> <!-- edit -->
          <button class="pag-btn btn-edit" data-delete title="Delete Staff" style="color: #ef4444; border-color: #fee2e2; background: #fef2f2;">Delete</button> <!-- delete -->
        </div>
      </td>
    </tr>
  </template>

  <!-- Delete modal -->
  <div class="modal-overlay" id="delete-modal" style="display: none; z-index: 9999;">
    <div class="modal-box modal-box-delete">
      
      <!-- warning icon -->
      <div class="delete-icon-wrapper" style="background-color: #fee2e2;">
        <svg viewBox="0 0 24 24" class="delete-alert-icon" style="stroke: #ef4444;">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
      </div>

      <h3 class="delete-modal-title">Delete Staff Member?</h3>

      <p class="delete-modal-subtitle" style="margin-bottom: 20px;">
        Are you sure you want to permanently delete 
        <strong id="delete-name"></strong>? This cannot be undone.
      </p>
      
      <input type="hidden" id="delete-id"> <!-- store id -->

      <p id="delete-msg" class="form-message error" style="display:none;"></p> <!-- error msg -->
      
      <div class="delete-modal-actions" style="justify-content: center; gap: 10px;">
        <button class="pag-btn" onclick="closeModal('delete-modal')">Cancel</button> <!-- cancel -->
        <button class="confirm-btn" id="confirm-delete-btn" style="background: #ef4444;">Delete Account</button> <!-- confirm -->
      </div>
    </div>
  </div>

  <!-- scripts -->
  <script src="../js/env.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/staff.js"></script>

</body>
</html>
