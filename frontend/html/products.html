<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Page settings -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Page title -->
  <title>Product Inventory – GroceryFlow</title>

  <!-- Page description -->
  <meta name="description" content="GroceryFlow – Product Inventory Management">

  <!-- Main stylesheet -->
  <link rel="stylesheet" href="../css/style.css">
</head>

<body class="inner-page">

  <!-- Header loads here -->
  <div id="header-placeholder"></div>

  <main class="inner-main">

    <!-- Back button -->
    <button onclick="window.history.back()" class="confirm-btn back-btn">
      ← Previous
    </button>

    <!-- Page title and add product button -->
    <div class="page-header-row">
      <h1 class="page-title">Product Inventory</h1>
      <a href="add_product.html" class="confirm-btn" id="add-product-btn">+ ADD PRODUCT</a>
    </div>

    <!-- Product filters -->
    <div class="filter-bar" id="prod-filter-bar">

      <!-- Search input -->
      <div class="filter-search-wrap" style="flex:2;">
        <svg class="filter-search-icon" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2.5">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>

        <input
          type="text"
          id="prod-search"
          class="filter-search-input"
          placeholder="Search by name, invoice, supplier…">
      </div>

      <!-- Category filter -->
      <select id="prod-filter-category" class="filter-select">
        <option value="">All Categories</option>
        <option>Dairy</option>
        <option>Bakery</option>
        <option>Meat</option>
        <option>Frozen</option>
        <option>Dry Goods</option>
        <option>Beverages</option>
        <option>Snacks</option>
        <option>Household</option>
        <option>Other</option>
      </select>

      <!-- Supplier filter -->
      <select id="prod-filter-supplier" class="filter-select">
        <option value="">All Suppliers</option>
      </select>

      <!-- Reset filters -->
      <button type="button" id="prod-filter-reset" class="filter-reset-btn">
        &#8635; Reset
      </button>
    </div>
    </div>

    <!-- Product table -->
    <div class="prod-table-wrap">
      <table class="prod-table">

        <!-- Table headings -->
        <thead>
          <tr>
            <th>Product Details</th>
            <th>Invoice</th>
            <th>Category</th>
            <th>Stock Level</th>
            <th>Price</th>
            <th class="text-center">Actions</th>
          </tr>
        </thead>

        <!-- Product rows load here -->
        <tbody id="prod-tbody">
          <tr>
            <td colspan="5" class="no-data">Loading…</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Product row template -->
    <template id="prod-row-tpl">
      <tr>
        <td>
          <div class="prod-details-cell">
            <div>
              <div class="prod-name" data-name></div>
              <div class="prod-sku" data-sku></div>
            </div>
          </div>
        </td>

        <!-- Invoice number -->
        <td data-invoice style="font-size: 18px;color:#6b7280;font-family:monospace;"></td>

        <!-- Product category -->
        <td data-category></td>

        <!-- Product stock -->
        <td data-stock></td>

        <!-- Product price -->
        <td data-price></td>

        <!-- Action buttons -->
        <td class="text-center">
          <div class="tbl-actions">
            <button class="pag-btn btn-edit" data-view-btn>View</button>
            <button class="pag-btn btn-edit" data-edit-btn>Edit</button>
            <button class="pag-btn btn-edit" data-update-btn>Stock</button>
          </div>
        </td>
      </tr>
    </template>

    <!-- Product details template -->
    <template id="view-body-tpl">
      <div class="view-grid">

        <div class="view-item">
          <span class="view-label">Name</span>
          <span class="view-val" data-vname></span>
        </div>

        <div class="view-item">
          <span class="view-label">Category</span>
          <span class="view-val" data-vcategory></span>
        </div>

        <div class="view-item">
          <span class="view-label">Stock (Live)</span>
          <span class="view-val" data-vstock></span>
        </div>

        <div class="view-item">
          <span class="view-label">Selling Price</span>
          <span class="view-val" data-vprice></span>
        </div>

        <div class="view-item">
          <span class="view-label">Cost Price</span>
          <span class="view-val" data-vcost></span>
        </div>

        <div class="view-item">
          <span class="view-label">Supplier</span>
          <span class="view-val" data-vsupplier></span>
        </div>

        <!-- Storage details -->
        <div class="view-item view-item-full">
          <span class="view-label">Storage</span>
          <span class="view-val" data-vstorage></span>
        </div>

        <!-- Product description -->
        <div class="view-item view-item-full">
          <span class="view-label">Description</span>
          <span class="view-val" data-vdescription></span>
        </div>

      </div>
    </template>

  </main>

  <!-- Product details modal -->
  <div class="modal-overlay" id="view-modal" style="display:none;">
    <div class="modal-box">

      <!-- Modal header -->
      <div class="modal-header">
        <h3 class="modal-title">Product Details</h3>

        <!-- Close modal button -->
        <button class="modal-close" onclick="closeModal('view-modal')">
          &#10005;
        </button>
      </div>

      <!-- Product details load here -->
      <div id="view-modal-body" class="modal-body"></div>
    </div>
  </div>

  <!-- Edit product modal -->
  <div class="modal-overlay" id="edit-modal" style="display:none;">
    <div class="modal-box">

      <!-- Modal title -->
      <div class="modal-header">
        <h3 class="modal-title">Edit Product</h3>

        <!-- Close modal -->
        <button class="modal-close" onclick="closeModal('edit-modal')">
          &#10005;
        </button>
      </div>

      <div class="modal-body">

        <!-- Edit product form -->
        <form id="edit-form" novalidate>

          <!-- Hidden product id -->
          <input type="hidden" id="edit-id">

          <!-- Product name and category -->
          <div class="edit-row">

            <div class="edit-col">
              <label class="ap-label" for="edit-name">NAME</label>
              <input class="ap-input" type="text" id="edit-name" required>
            </div>

            <div class="edit-col">
              <label class="ap-label" for="edit-category">CATEGORY</label>

              <select class="ap-input ap-select" id="edit-category">
                <option>Dairy</option>
                <option>Bakery</option>
                <option>Meat</option>
                <option>Frozen</option>
                <option>Dry Goods</option>
                <option>Beverages</option>
                <option>Snacks</option>
                <option>Household</option>
                <option>Other</option>
              </select>
            </div>
          </div>

          <!-- Product prices -->
          <div class="edit-row">

            <div class="edit-col">
              <label class="ap-label" for="edit-price">SELLING PRICE</label>
              <input class="ap-input" type="number" step="0.01" id="edit-price">
            </div>

            <div class="edit-col">
              <label class="ap-label" for="edit-cost">COST PRICE</label>
              <input class="ap-input" type="number" step="0.01" id="edit-cost">
            </div>
          </div>

          <!-- Supplier and storage -->
          <div class="edit-row">

            <div class="edit-col">
              <label class="ap-label" for="edit-supplier">SUPPLIER</label>

              <select class="ap-input ap-select" id="edit-supplier" required>
                <option value="">Loading suppliers...</option>
              </select>
            </div>

            <div class="edit-col">
              <label class="ap-label" for="edit-storage">STORAGE INSTRUCTIONS</label>

              <input
                class="ap-input"
                type="text"
                id="edit-storage"
                placeholder="e.g. Cold Room A">
            </div>
          </div>

          <!-- Product description -->
          <div class="edit-row">
            <div class="edit-col edit-col-full">

              <label class="ap-label" for="edit-description">
                DESCRIPTION
              </label>

              <textarea
                class="ap-input ap-textarea"
                id="edit-description"
                rows="2"></textarea>
            </div>
          </div>

          <!-- Form message -->
          <p id="edit-msg" class="form-message" style="display:none;"></p>

          <!-- Modal buttons -->
          <div class="modal-footer">
            <button
              type="button"
              class="pag-btn"
              onclick="closeModal('edit-modal')">
              Cancel
            </button>

            <button
              type="submit"
              class="confirm-btn"
              id="edit-submit">
              Save Changes
            </button>
          </div>

        </form>
      </div>
    </div>
  </div>

  <!-- Stock page note -->
  <!-- Use stock.html to update product stock -->

  <!-- Rejection message modal -->
  <div class="modal-overlay" id="rejection-modal" style="display:none; z-index: 9999;">
    <div class="modal-box modal-box-delete">

      <!-- Warning icon -->
      <div class="delete-icon-wrapper" style="background-color: #fee2e2;">

        <svg viewBox="0 0 24 24" class="delete-alert-icon" style="stroke: #ef4444;">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
      </div>

      <!-- Rejection title -->
      <h3 class="delete-modal-title">Product Rejected</h3>

      <!-- Rejection message -->
      <p class="delete-modal-subtitle" id="rejection-message">
        Admin declined your request to add product.
      </p>

      <!-- OK button -->
      <div class="delete-modal-actions" style="justify-content: center;">
        <button class="confirm-btn" id="ack-rejection-btn" style="width:100%;">
          OK
        </button>
      </div>
    </div>
  </div>

  <!-- Footer loads here -->
  <div id="footer-placeholder"></div>

  <!-- JS files -->
  <script src="../js/env.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/components.js"></script>

  <!-- Product page script -->
  <script src="../js/products.js"></script>

</body>

</html>
