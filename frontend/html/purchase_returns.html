<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Purchase Returns – GroceryFlow</title>
  <meta name="description" content="GroceryFlow – Record and track purchase returns">
  <link rel="stylesheet" href="../css/style.css">
</head>

<body class="inner-page">
  <div id="header-placeholder"></div>

  <main class="inner-main">

    <button onclick="window.history.back()" class="confirm-btn back-btn">← Previous</button>

    <div class="page-header-row">
      <h1 class="page-title">Purchase Returns</h1>
      <button class="confirm-btn" id="pr-open-form-btn">+ NEW RETURN</button>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar" id="pr-filter-bar">
      <div class="filter-search-wrap" style="flex:2;">
        <svg class="filter-search-icon" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="pr-search" class="filter-search-input" placeholder="Search by invoice, item, supplier…">
      </div>
      <select id="pr-filter-supplier" class="filter-select">
        <option value="">All Suppliers</option>
      </select>
      <button type="button" id="pr-filter-reset" class="filter-reset-btn">&#8635; Reset</button>
    </div>

    <!-- History Table -->
    <div class="prod-table-wrap">
      <table class="prod-table" id="pr-table">
        <thead>
          <tr>
            <th>Invoice #</th>
            <th>Supplier</th>
            <th>Item</th>
            <th>Category</th>
            <th>Qty Returned</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="pr-tbody">
          <tr><td colspan="6" class="no-data">Loading…</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Row template -->
    <template id="pr-row-tpl">
      <tr>
        <td data-pr-invoice style="font-family:monospace;font-size:12px;color:#6b7280;"></td>
        <td data-pr-supplier></td>
        <td data-pr-item></td>
        <td data-pr-category></td>
        <td data-pr-qty style="font-weight:700;color:#dc2626;"></td>
        <td data-pr-date style="font-size:12px;color:#6b7280;"></td>
      </tr>
    </template>

  </main>

  <!-- NEW RETURN MODAL -->
  <div class="modal-overlay" id="pr-modal" style="display:none;">
    <div class="modal-box">
      <div class="modal-header">
        <h3 class="modal-title">Record Purchase Return</h3>
        <button class="modal-close" onclick="closeModal('pr-modal')">&#10005;</button>
      </div>
      <div class="modal-body">
        <form id="pr-form" novalidate>

          <!-- Invoice Number -->
          <div class="edit-row">
            <div class="edit-col edit-col-full">
              <label class="ap-label" for="pr-invoice">INVOICE NUMBER <span style="color:#ef4444">*</span></label>
              <div style="display:flex;gap:8px;align-items:center;">
                <input class="ap-input" type="text" id="pr-invoice" placeholder="PR-0001"
                  required style="flex:1;text-transform:uppercase;">
                <button type="button" id="pr-gen-invoice" class="pag-btn"
                  style="white-space:nowrap;height:42px;padding:0 14px;">Auto</button>
              </div>
            </div>
          </div>

          <!-- Supplier -->
          <div class="edit-row">
            <div class="edit-col edit-col-full">
              <label class="ap-label" for="pr-supplier">SUPPLIER <span style="color:#ef4444">*</span></label>
              <select class="ap-input ap-select" id="pr-supplier" required>
                <option value="" disabled selected>Select supplier</option>
              </select>
            </div>
          </div>

          <!-- Category + Item -->
          <div class="edit-row">
            <div class="edit-col">
              <label class="ap-label" for="pr-category-sel">CATEGORY <span style="color:#ef4444">*</span></label>
              <select class="ap-input ap-select" id="pr-category-sel" required>
                <option value="" disabled selected>Loading categories…</option>
              </select>
            </div>
            <div class="edit-col">
              <label class="ap-label" for="pr-item">ITEM NAME <span style="color:#ef4444">*</span></label>
              <select class="ap-input ap-select" id="pr-item" required>
                <option value="" disabled selected>Select category first</option>
              </select>
            </div>
          </div>

          <!-- Quantity -->
          <div class="edit-row">
            <div class="edit-col">
              <label class="ap-label" for="pr-qty">RETURN QUANTITY <span style="color:#ef4444">*</span></label>
              <input class="ap-input" type="number" id="pr-qty" min="1" value="1" required>
            </div>
            <div class="edit-col" id="pr-stock-info-wrap" style="display:flex;align-items:flex-end;padding-bottom:4px;">
              <p id="pr-stock-info" style="font-size:13px;color:#6b7280;margin:0;"></p>
            </div>
          </div>

          <p id="pr-form-msg" class="form-message" style="display:none;"></p>

          <div class="modal-footer">
            <button type="button" class="pag-btn" onclick="closeModal('pr-modal')">Cancel</button>
            <button type="submit" class="confirm-btn" id="pr-submit">Submit Return</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="../js/env.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/purchase_returns.js"></script>
</body>
</html>
