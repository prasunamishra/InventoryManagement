<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – GroceryFlow</title>
  <meta name="description" content="Sign in to GroceryFlow – Internal Inventory & Logistics Management System">
  <link rel="stylesheet" href="../css/style.css">
</head>

<body class="login-page">

  <div class="login-wrapper">
    <div class="login-card">

      <div class="login-logo">
        <span class="login-logo-icon">🛒</span>
        GroceryFlow
      </div>
      <p class="login-subtitle">Inventory Management System</p>

      <form id="loginForm" novalidate>
        <div class="role-selector" style="margin-bottom: 24px; display: flex; gap: 10px;">
          <input type="radio" id="role-admin" name="login_role" value="admin" checked style="display:none;">
          <label for="role-admin" class="role-tab active"
            style="flex: 1; text-align: center; padding: 10px; background: #0d9488; color: white; border-radius: 5px; cursor: pointer; font-weight: bold; transition: all 0.2s; font-size: 18px;">Admin
            Login</label>

          <input type="radio" id="role-staff" name="login_role" value="staff" style="display:none;">
          <label for="role-staff" class="role-tab"
            style="flex: 1; text-align: center; padding: 10px; background: #e5e7eb; color: #4b5563; border-radius: 5px; cursor: pointer; font-weight: bold; transition: all 0.2s; font-size: 18px;">Staff
            Login</label>
        </div>
        <div class="form-group">
          <label class="form-label" for="username">USERNAME</label>
          <input type="text" id="username" name="username" class="form-input" placeholder="Enter your username"
            autocomplete="username" required>
        </div>

        <div class="form-group">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
            <label class="form-label" for="password" style="margin-bottom: 0;">PASSWORD</label>
            <a href="forgot_password.html?role=admin" id="forgot-password-link"
              style="font-size: 18px; color: #0d9488; text-decoration: none; font-weight: 500;">Forgot Password?</a>
          </div>
          <div style="position: relative;">
            <input type="password" id="password" name="password" class="form-input" placeholder="Enter your password"
              autocomplete="current-password" required style="padding-right: 36px;">
            <button type="button" id="toggle-password" aria-label="Toggle password visibility"
              style="position:absolute; right:4px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; padding:4px; font-size:18px; color:#9ca3af; line-height:1;">
              👁
            </button>
          </div>
        </div>

        <div class="form-options" style="display: flex; align-items: center; gap: 8px; margin-bottom: 20px;">
          <input type="checkbox" id="remember" name="remember"
            style="accent-color: #0d9488; width: 16px; height: 16px; cursor: pointer;">
          <label for="remember" style="font-size: 18px; color: #4b5563; cursor: pointer; user-select: none;">Remember
            me</label>
        </div>

        <p id="login-error" class="login-error" style="display:none;"></p>

        <button type="submit" id="login-submit" class="login-btn">LOG IN</button>
      </form>
    </div>

    <p class="login-footer-text">© 2026 GroceryFlow – Inventory & Logistics</p>
  </div>

  <script src="../js/env.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    // Dynamically update "Forgot Password?" link to match selected role tab
    const roleRadios = document.querySelectorAll('input[name="login_role"]');
    const forgotLink = document.getElementById('forgot-password-link');

    function updateForgotLink() {
      const selectedRole = document.querySelector('input[name="login_role"]:checked')?.value || 'admin';
      forgotLink.href = `forgot_password.html?role=${selectedRole}`;
    }

    roleRadios.forEach(radio => radio.addEventListener('change', updateForgotLink));
    updateForgotLink(); // set correctly on page load

    // Password visibility toggle
    const toggleBtn = document.getElementById('toggle-password');
    const pwInput = document.getElementById('password');
    if (toggleBtn && pwInput) {
      toggleBtn.addEventListener('click', function () {
        const isPassword = pwInput.type === 'password';
        pwInput.type = isPassword ? 'text' : 'password';
        this.textContent = isPassword ? '👁' : '👁';
      });
    }
  </script>
</body>

</html>
