<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8"> <!-- encoding -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- responsive -->
  <title>Forgot Password – GroceryFlow</title>
  <link rel="stylesheet" href="../css/style.css"> <!-- styles -->
</head>

<body class="login-page">

  <div class="login-wrapper">
    <div class="login-card">

      <!-- logo -->
      <div class="login-logo">
        <span class="login-logo-icon">🛒</span>
        GroceryFlow
      </div>

      <!-- subtitle -->
      <p class="login-subtitle" id="page-subtitle">Reset Password</p>

      <!-- form -->
      <form id="forgotForm" novalidate>
        <input type="hidden" id="reset-role" value="admin"> <!-- role -->

        <!-- info text -->
        <p style="font-size: 18px; color: #4b5563; margin-bottom: 20px; line-height: 1.5;">
          Enter the email address associated with your account and we'll send you a secure link to reset your password.
        </p>

        <!-- email -->
        <div class="form-group">
          <label class="form-label" for="email">EMAIL ADDRESS</label>
          <input type="email" id="email" name="email" class="form-input" placeholder="Enter your email" required>
        </div>

        <p id="forgot-msg" class="login-error" style="display:none;"></p> <!-- message -->

        <!-- submit -->
        <button type="submit" id="forgot-submit" class="login-btn">SEND RESET LINK</button>
        
        <!-- back -->
        <div style="text-align: center; margin-top: 16px;">
          <a href="login.html" style="font-size: 18px; color: #0d9488; text-decoration: none; font-weight: 500;">
            ← Back to Login
          </a>
        </div>
      </form>
    </div>

    <!-- footer -->
    <p class="login-footer-text">© 2026 GroceryFlow – Inventory & Logistics</p>
  </div>

  <!-- scripts -->
  <script src="../js/env.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/forgot_password.js"></script>
</body>

</html>
